<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#f5f5f5;
}

.profile-container{
    width:450px;
    margin:60px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    text-align:center;
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    margin-bottom:20px;
}

.profile-container h2{
    margin-bottom:10px;
}

.profile-info{
    text-align:left;
    margin-top:25px;
}

.profile-info p{
    margin:10px 0;
    font-size:15px;
}

.edit-btn{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#ff6b00;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="profile-container">

    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img">

    <h2>{{ user.username }}</h2>

    <div class="profile-info">
        <p><b>Email :</b> {{ user.email }}</p>
        <p><b>Room Number :</b> {{ user.room_number }}</p>
        <p><b>Phone :</b> {{ user.phone }}</p>
    </div>

    <button class="edit-btn">Edit Profile</button>

</div>

</body>
</html>
