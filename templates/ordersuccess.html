<!DOCTYPE html>
<html>
<head>
    <title>Order Successful</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f8f8f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .success-card{
            background:white;
            padding:40px 50px;
            border-radius:15px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
            text-align:center;
            width:400px;
        }

        .success-icon{
            font-size:60px;
            color:#28a745;
            margin-bottom:20px;
        }

        h2{
            color:#333;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        .home-btn{
            padding:12px 25px;
            border:none;
            border-radius:8px;
            background:#fc8019;
            color:white;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            text-decoration:none;
        }

        .home-btn:hover{
            background:#e56e10;
        }
    </style>
</head>

<body>

    <div class="success-card">

        <div class="success-icon">✅</div>

        <h2>Order Placed Successfully!</h2>

        <p>
            Thank you! Your meal has been ordered successfully.
            Mess team will prepare it soon.
        </p>

        <a href="{% url 'home' %}" class="home-btn">
            Back to Home
        </a>

    </div>

</body>
</html>
