<!DOCTYPE html>
<html>
<head>
<title>Admin Complaints</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#ff6b00;
color:white;
}

textarea{
width:100%;
padding:8px;
}

button{
background:green;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:5px;
}

.pending{
background:red;
color:white;
padding:4px 10px;
border-radius:10px;
font-size:12px;
}

.completed{
background:green;
color:white;
padding:4px 10px;
border-radius:10px;
font-size:12px;
}

</style>
</head>

<body>

<h2>All Complaints</h2>

<table>

<tr>
<th>Subject</th>
<th>Message</th>
<th>Status</th>
<th>Reply</th>
<th>Action</th>
</tr>

{% for c in complaints %}

<tr>

<td>{{c.subject}}</td>
<td>{{c.message}}</td>

<td>

{% if c.status == "Pending" %}
<span class="pending">Pending</span>
{% else %}
<span class="completed">Completed</span>
{% endif %}

</td>

<td>{{c.reply}}</td>

<td>

{% if c.status == "Pending" %}

<form method="post">

{% csrf_token %}

<input type="hidden" name="cid" value="{{c.id}}">

<textarea name="reply" placeholder="Write reply..." required></textarea>

<button type="submit">Mark Completed</button>

</form>

{% else %}

Done

{% endif %}

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
